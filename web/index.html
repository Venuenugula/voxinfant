<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VoxInfant — Infant Cry Analysis</title>
<style>
  :root {
    --bg: #0f1220; --panel: #181c2e; --panel2: #1f2438; --txt: #e7e9f3;
    --muted: #9aa0bd; --accent: #7c8cff; --pain: #ff6b6b; --distress: #ffb454; --burping: #4dd4ac;
    --line: #2a3050;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 70% -10%, #20264a 0%, var(--bg) 55%);
    color: var(--txt); min-height: 100vh; line-height: 1.5;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 64px; }
  header { text-align: center; margin-bottom: 28px; }
  .logo { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .sub { color: var(--muted); margin-top: 6px; font-size: 0.98rem; }
  .badge {
    display: inline-block; margin-top: 12px; font-size: 0.72rem; font-weight: 600;
    color: var(--distress); border: 1px solid var(--distress); border-radius: 999px;
    padding: 3px 10px; opacity: 0.9;
  }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    padding: 22px; margin-bottom: 20px;
  }
  .drop {
    border: 2px dashed var(--line); border-radius: 14px; padding: 34px 20px; text-align: center;
    cursor: pointer; transition: border-color .15s, background .15s;
  }
  .drop:hover, .drop.over { border-color: var(--accent); background: #1c2138; }
  .drop .big { font-size: 1.05rem; font-weight: 600; }
  .drop .small { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }
  #file { display: none; }
  canvas { width: 100%; height: 90px; display: block; margin-top: 16px;
           background: var(--panel2); border-radius: 10px; }
  audio { width: 100%; margin-top: 14px; }
  button.analyze {
    width: 100%; margin-top: 16px; padding: 13px; font-size: 1rem; font-weight: 700;
    color: #0f1220; background: var(--accent); border: none; border-radius: 10px; cursor: pointer;
  }
  button.analyze:disabled { opacity: 0.5; cursor: not-allowed; }
  .result-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .pred-label { font-size: 1.7rem; font-weight: 800; text-transform: capitalize; }
  .pred-conf { font-size: 1.2rem; font-weight: 700; color: var(--muted); }
  .bar-row { margin-top: 14px; }
  .bar-row .lab { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 4px; }
  .bar { height: 10px; border-radius: 999px; background: var(--panel2); overflow: hidden; }
  .bar > i { display: block; height: 100%; border-radius: 999px; transition: width .5s ease; }
  .meta { color: var(--muted); font-size: 0.82rem; margin-top: 16px; }
  .disclaimer { color: var(--muted); font-size: 0.78rem; margin-top: 10px; border-top: 1px solid var(--line); padding-top: 10px; }
  .hidden { display: none; }
  .spinner { width: 22px; height: 22px; border: 3px solid var(--line); border-top-color: var(--accent);
             border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: var(--pain); font-size: 0.9rem; margin-top: 10px; }
  .cap { text-transform: capitalize; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Vox<span>Infant</span></div>
    <div class="sub">AI-powered infant cry analysis — pain · burping · distress</div>
    <div class="badge">Research preview · not a medical device</div>
  </header>

  <div class="card">
    <label class="drop" id="drop" for="file">
      <div class="big">Upload a cry recording</div>
      <div class="small">Click or drag a .wav / .mp3 file here</div>
    </label>
    <input type="file" id="file" accept=".wav,.mp3,audio/*" />
    <canvas id="wave" class="hidden"></canvas>
    <audio id="player" class="hidden" controls></audio>
    <button class="analyze" id="analyze" disabled>Analyze cry</button>
    <div class="err hidden" id="err"></div>
  </div>

  <div class="card hidden" id="loading">
    <div class="spinner"></div>
    <div class="meta" style="text-align:center">Analyzing… (DSP → segmentation → features → ensemble)</div>
  </div>

  <div class="card hidden" id="result">
    <div class="result-head">
      <div class="pred-label" id="predLabel">—</div>
      <div class="pred-conf" id="predConf">—</div>
    </div>
    <div id="bars"></div>
    <div class="meta" id="segMeta"></div>
    <div class="disclaimer" id="disc"></div>
  </div>
</div>

<script>
// --- Backend location ---------------------------------------------------
// Empty = same origin (when the FastAPI backend also serves this page, e.g. on
// Hugging Face Spaces). When hosting this page separately (e.g. Vercel), set
// DEFAULT_API_BASE to your backend URL, OR visit ?api=https://your-space.hf.space
// once (it is remembered in localStorage).
const DEFAULT_API_BASE = "";
const _p = new URLSearchParams(location.search);
if (_p.get('api')) localStorage.setItem('voxinfant_api', _p.get('api').replace(/\/$/, ''));
const API_BASE = (localStorage.getItem('voxinfant_api') || DEFAULT_API_BASE).replace(/\/$/, '');

const COLORS = { pain: getCss('--pain'), distress: getCss('--distress'), burping: getCss('--burping') };
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

const fileInput = document.getElementById('file');
const drop = document.getElementById('drop');
const analyzeBtn = document.getElementById('analyze');
const player = document.getElementById('player');
const canvas = document.getElementById('wave');
const errBox = document.getElementById('err');
let currentFile = null;

drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('over');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

function handleFile(f) {
  currentFile = f;
  hide('err'); hide('result');
  drop.querySelector('.big').textContent = f.name;
  drop.querySelector('.small').textContent = (f.size/1024).toFixed(0) + ' KB';
  analyzeBtn.disabled = false;
  const url = URL.createObjectURL(f);
  player.src = url; player.classList.remove('hidden');
  drawWaveform(f);
}

async function drawWaveform(f) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = await ctx.decodeAudioData(await f.arrayBuffer());
    const data = buf.getChannelData(0);
    canvas.classList.remove('hidden');
    const c = canvas.getContext('2d');
    const W = canvas.width = canvas.offsetWidth * 2, H = canvas.height = 180;
    c.clearRect(0,0,W,H);
    c.fillStyle = getCss('--accent');
    const step = Math.floor(data.length / W);
    for (let x = 0; x < W; x++) {
      let min = 1, max = -1;
      for (let i = 0; i < step; i++) { const v = data[x*step+i]; if (v<min) min=v; if (v>max) max=v; }
      const y1 = (1+min)*H/2, y2 = (1+max)*H/2;
      c.fillRect(x, y1, 1, Math.max(1, y2-y1));
    }
  } catch (e) { canvas.classList.add('hidden'); }
}

analyzeBtn.addEventListener('click', async () => {
  if (!currentFile) return;
  hide('err'); hide('result'); show('loading'); analyzeBtn.disabled = true;
  try {
    const fd = new FormData(); fd.append('file', currentFile);
    const res = await fetch(`${API_BASE}/predict`, { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Prediction failed');
    renderResult(data);
  } catch (e) {
    showErr(e.message);
  } finally {
    hide('loading'); analyzeBtn.disabled = false;
  }
});

function renderResult(d) {
  document.getElementById('predLabel').textContent = d.prediction;
  document.getElementById('predLabel').style.color = COLORS[d.prediction] || getCss('--txt');
  document.getElementById('predConf').textContent = (d.confidence*100).toFixed(0) + '%'
      + (d.confident ? '' : ' (low confidence)');
  const order = Object.entries(d.probabilities).sort((a,b)=>b[1]-a[1]);
  document.getElementById('bars').innerHTML = order.map(([k,v]) => `
    <div class="bar-row">
      <div class="lab"><span class="cap">${k}</span><span>${(v*100).toFixed(1)}%</span></div>
      <div class="bar"><i style="width:${(v*100).toFixed(1)}%;background:${COLORS[k]||'#888'}"></i></div>
    </div>`).join('');
  document.getElementById('segMeta').textContent =
    `${d.segments_analyzed} segment(s) analyzed · probabilities averaged across segments`;
  document.getElementById('disc').textContent = d.disclaimer || '';
  show('result');
}

function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }
function showErr(m){ errBox.textContent = m; errBox.classList.remove('hidden'); }
</script>
</body>
</html>
